title: Atlanta Fed RevealJS Theme
author: Federal Reserve Bank of Atlanta
version: 1.0.0
quarto-required: ">=1.3.0"
contributes:
  format:
    revealjs:
      theme: [default, atlanta-fed.scss]
      width: 1280
      height: 720
      slide-number: false
      hash: true
      transition: none
      center: false
      margin: 0
      min-scale: 0.1
      max-scale: 3.0
      include-in-header:
        - atlanta-fed-init.html
