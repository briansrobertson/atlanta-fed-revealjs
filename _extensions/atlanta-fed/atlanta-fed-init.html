    injectBackground();
    fixTitleText();
    fixContentHeadings();
    fixContentSpacing();
  }

  // ── Title text: max-width, 2-line clamp, subtitle repositioning ─────────
  function fixTitleText() {
    var titleSlide = document.getElementById('title-slide');
    if (!titleSlide) return;

    var titleEl    = titleSlide.querySelector('h1.title');
    var subtitleEl = titleSlide.querySelector('.subtitle');
    var authorEl   = titleSlide.querySelector('.author');
    if (!titleEl) return;

    var TITLE_TOP = 264;  // px from top of slide
    var LEFT      = 60;   // px from left
    var RIGHT_PAD = 60;   // match left
    var SLIDE_W   = 1280;
    var MAX_W     = SLIDE_W - LEFT - RIGHT_PAD; // 1160px
    var MAX_LINES = 2;
    var MIN_FONT  = 36;   // floor so text never becomes unreadable

    // Set max-width to mirror left padding on the right
    titleEl.style.setProperty('max-width', MAX_W + 'px', 'important');
    titleEl.style.setProperty('width', MAX_W + 'px', 'important');

    // Shrink font until title fits in MAX_LINES lines
    var fontSize = parseFloat(getComputedStyle(titleEl).fontSize) || 80;
    titleEl.style.setProperty('font-size', fontSize + 'px', 'important');

    function getLineH() {
      var lh = getComputedStyle(titleEl).lineHeight;
      return lh === 'normal' ? fontSize * 1.15 : parseFloat(lh);
    }

    var maxH = getLineH() * MAX_LINES;
    while (titleEl.scrollHeight > maxH + 2 && fontSize > MIN_FONT) {
      fontSize -= 1;
      titleEl.style.setProperty('font-size', fontSize + 'px', 'important');
      maxH = getLineH() * MAX_LINES;
    }

    // Reposition subtitle/author: maintain gap below actual title bottom
    var GAP = 22; // px between title bottom and subtitle top
    var titleBottom = TITLE_TOP + titleEl.offsetHeight;
    var subtitleTop = titleBottom + GAP;

    if (subtitleEl) {
      subtitleEl.style.setProperty('top', subtitleTop + 'px', 'important');
    }
    if (authorEl) {
      var subtitleH = subtitleEl ? subtitleEl.offsetHeight : 0;
      authorEl.style.setProperty('top', (subtitleTop + subtitleH + 8) + 'px', 'important');
    }
  }

  // ── Content slide headings: shrink font only if text overflows header bar ─
  function fixContentHeadings() {
    var BAR_H    = 168;  // px — header bar height
    var MARGIN   = 12;   // px — 1/8" clearance top & bottom
    var MAX_H    = BAR_H - (MARGIN * 2); // 144px usable
    var MIN_FONT = 18;   // floor
    var DEFAULT_FONT = 48; // 36pt — only reduce below this if needed

    var headings = document.querySelectorAll(
      '.reveal .slides section:not(#title-slide):not(.title-slide) h2'
    );

    headings.forEach(function(h2) {
      // Reset to default first
      h2.style.setProperty('font-size', DEFAULT_FONT + 'px', 'important');

      // Measure natural text height using a temp block-display clone
      var clone = h2.cloneNode(true);
      clone.style.cssText = [
        'position:absolute',
        'visibility:hidden',
        'display:block',
        'font-size:' + DEFAULT_FONT + 'px',
        'width:' + h2.offsetWidth + 'px',
        'line-height:' + getComputedStyle(h2).lineHeight,
        'white-space:normal',
        'padding:0',
        'margin:0'
      ].join(';');
      document.body.appendChild(clone);
      var textH = clone.scrollHeight;
      document.body.removeChild(clone);

      // Only shrink if natural text height exceeds usable area
      if (textH <= MAX_H) return;

      var fontSize = DEFAULT_FONT;
      clone = h2.cloneNode(true);
      clone.style.cssText = 'position:absolute;visibility:hidden;display:block;width:' + h2.offsetWidth + 'px;white-space:normal;padding:0;margin:0;';
      document.body.appendChild(clone);

      while (textH > MAX_H && fontSize > MIN_FONT) {
        fontSize -= 1;
        clone.style.fontSize = fontSize + 'px';
        textH = clone.scrollHeight;
      }
      document.body.removeChild(clone);

      h2.style.setProperty('font-size', fontSize + 'px', 'important');
    });
  }

  // ── Fix content slide spacing ───────────────────────────────────────────
  function fixContentSpacing() {
    var sections = document.querySelectorAll('.reveal .slides section:not(#title-slide):not(.title-slide)');
    sections.forEach(function(section) {
      section.style.gap = '0';
      section.style.rowGap = '0';
      var h2 = section.querySelector('h2');
      if (!h2) return;
      var isFirst = true;
      var el = h2.nextElementSibling;
      while (el) {
        if (isFirst) {
          el.style.setProperty('margin-top', '192px', 'important');
          isFirst = false;
        } else {
          el.style.setProperty('margin-top', '0', 'important');
        }
        el.style.setProperty('margin-bottom', '0.3em', 'important');
        // Ensure consistent right padding so all elements end at 1" from edge
        if (el.tagName === 'UL' || el.tagName === 'OL') {
          el.style.setProperty('padding-right', '96px', 'important');
          el.style.setProperty('box-sizing', 'border-box', 'important');
          el.style.setProperty('width', '100%', 'important');
        }
        // Table: add matching 1" padding on both sides
        if (el.tagName === 'TABLE' || (el.tagName === 'DIV' && el.querySelector('table'))) {
          var tbl = el.tagName === 'TABLE' ? el : el.querySelector('table');
          if (tbl) {
            tbl.style.setProperty('width', 'calc(100% - 192px)', 'important');
            tbl.style.setProperty('margin-left', '96px', 'important');
            tbl.style.setProperty('margin-right', '96px', 'important');
            tbl.style.setProperty('box-sizing', 'border-box', 'important');
          }
        }
        el = el.nextElementSibling;
      }
    });
  }

  // ── Force title slide layout ────────────────────────────────────────────
  // Quarto adds class="center" which applies flex centering. Remove it.
  function fixTitleSlide() {
    var titleSlide = document.getElementById('title-slide');
    if (!titleSlide) return;
    titleSlide.classList.remove('center');
    titleSlide.style.cssText += ';display:block!important;';
  }


  // ── Background image injection ──────────────────────────────────────────
  // Embed the title background directly so no external file is needed.
  function injectBackground() {
    // RevealJS renders data-background-image into .slide-background-content divs.
    // Find the first one (title slide) and set its background-image.
    var bgEl = document.querySelector('.reveal .backgrounds .slide-background:first-child .slide-background-content');
    if (bgEl) {
      bgEl.style.backgroundImage = 'url(' + BG_DATA_URI + ')';
      bgEl.style.backgroundSize = 'cover';
      bgEl.style.backgroundPosition = 'center';
    }
    // Also set directly on #title-slide as fallback
    var titleSlide = document.getElementById('title-slide');
    if (titleSlide) {
      titleSlide.style.backgroundImage = 'url(' + BG_DATA_URI + ')';
      titleSlide.style.backgroundSize = 'cover';
      titleSlide.style.backgroundPosition = 'center';
    }
  }

  // ── Custom slide numbering ───────────────────────────────────────────────
  // Hidden on title slide; first content slide = 1
  function setupSlideNumbers() {
    Reveal.configure({ slideNumber: true });

    function getNumEl() {
      return document.querySelector('.reveal .slide-number');
    }

    function update() {
      var numEl = getNumEl();
      if (!numEl) return;
      var indices = Reveal.getIndices();
      var h = indices.h;
      if (h === 0) {
        numEl.style.display = 'none';
      } else {
        numEl.style.display = '';
        numEl.textContent = String(h);
      }
    }

    Reveal.on('slidechanged', update);
    // Give the slide-number element time to be created
    setTimeout(update, 100);
  }

  // ── Wait for Reveal ──────────────────────────────────────────────────────
  function waitForReveal(cb) {
    if (typeof Reveal !== 'undefined' && Reveal.isReady && Reveal.isReady()) {
      cb();
    } else if (typeof Reveal !== 'undefined') {
      Reveal.on('ready', cb);
    } else {
      var attempts = 0;
      var poll = setInterval(function () {
        attempts++;
        if (typeof Reveal !== 'undefined') {
          clearInterval(poll);
          if (Reveal.isReady && Reveal.isReady()) {
            cb();
          } else {
            Reveal.on('ready', cb);
          }
        } else if (attempts > 100) {
          clearInterval(poll);
        }
      }, 50);
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    waitForReveal(onRevealReady);
  });

  // Belt-and-suspenders: also try on window load and after delays
  window.addEventListener('load', function () {
    waitForReveal(onRevealReady);
  });

  // Quarto may initialize Reveal late — keep trying for up to 10s
  var _done = false;
  var _fallbackInterval = setInterval(function () {
    if (_done) { clearInterval(_fallbackInterval); return; }
    if (typeof Reveal !== 'undefined' && Reveal.isReady && Reveal.isReady()) {
      clearInterval(_fallbackInterval);
      _done = true;
      onRevealReady();
    }
  }, 200);
  setTimeout(function () { clearInterval(_fallbackInterval); }, 10000);

  // Guard against double-execution
  var _executed = false;
  var _origOnRevealReady = onRevealReady;
  onRevealReady = function () {
    if (_executed) return;
    _executed = true;
    _done = true;
    _origOnRevealReady();
  };

})();
</script>
